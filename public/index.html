<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TableFlow POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo"><i data-lucide="utensils-crossed"></i></div>
    <nav class="sidebar-nav">
      <button class="sidebar-item active" data-tab="tables"><i data-lucide="layout-dashboard"></i><span>Tables</span></button>
      <button class="sidebar-item" data-tab="pos"><i data-lucide="receipt"></i><span>POS</span></button>
      <button class="sidebar-item" data-tab="orders"><i data-lucide="clipboard-list"></i><span>Orders</span></button>
      <button class="sidebar-item" data-tab="kitchen"><i data-lucide="chef-hat"></i><span>Kitchen</span></button>
      <button class="sidebar-item" data-tab="staff"><i data-lucide="users"></i><span>Staff</span></button>
    </nav>
    <div class="sidebar-bottom">
      <button class="sidebar-item" data-tab="settings"><i data-lucide="settings"></i><span>Settings</span></button>
      <button class="sidebar-item" id="logoutBtn"><i data-lucide="log-out"></i><span>Logout</span></button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <header id="header">
      <h1 class="header-title" id="pageTitle">Floor Plan</h1>
      <div class="header-right">
        <span id="connectionStatus" class="ws-dot ws-connected" title="WebSocket"></span>
        <div class="header-pill"><i data-lucide="map-pin" style="width:14px;height:14px"></i><span id="headerLocation">Restaurant</span></div>
        <div class="header-pill"><i data-lucide="clock" style="width:14px;height:14px;color:#3b82f6"></i><span id="currentTime"></span></div>
        <div class="header-avatar"><span id="currentUser">A</span></div>
      </div>
    </header>

    <div class="content-area">
      <div id="tabTables" class="tab-content active">
        <div class="tab-inner">
          <div class="tables-legend" id="tablesLegend"></div>
          <div class="tables-grid" id="tablesGrid"></div>
        </div>
      </div>

      <div id="tabPos" class="tab-content">
        <div class="pos-layout">
          <div class="pos-menu-area">
            <div class="pos-search-row">
              <div class="pos-search">
                <i data-lucide="search" style="width:18px;height:18px;color:#94a3b8;position:absolute;left:14px;top:50%;transform:translateY(-50%)"></i>
                <input type="text" id="posSearch" placeholder="Search menu items..." class="pos-search-input">
              </div>
            </div>
            <div class="pos-categories" id="posCategories"></div>
            <div class="pos-items-grid" id="posItemsGrid"></div>
          </div>
          <div class="pos-ticket" id="posTicket">
            <div class="pos-ticket-header">
              <div class="pos-ticket-title-row">
                <h2>Current Order</h2>
                <span class="pos-table-badge" id="posTableBadge">No Table</span>
              </div>
              <div class="pos-ticket-meta"><i data-lucide="users" style="width:14px;height:14px"></i><span id="posGuests">Select a table</span></div>
            </div>
            <div class="pos-ticket-items" id="posTicketItems">
              <div class="pos-ticket-empty"><i data-lucide="receipt" style="width:48px;height:48px;opacity:0.15"></i><p>No items in current order</p><span>Select a table from the floor plan first.</span></div>
            </div>
            <div class="pos-ticket-footer" id="posTicketFooter" style="display:none">
              <div class="pos-totals">
                <div class="pos-total-row"><span>Subtotal</span><span id="posSubtotal"></span></div>
                <div class="pos-total-row"><span>Tax</span><span id="posTax"></span></div>
                <div class="pos-total-row pos-total-final"><span>Total</span><span id="posTotal"></span></div>
              </div>
              <div class="pos-actions" id="posActions"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="tabOrders" class="tab-content">
        <div class="tab-inner">
          <div class="orders-header"><h2>Active Orders</h2><span class="orders-count" id="ordersCount">0 orders</span></div>
          <div class="orders-list" id="ordersList"></div>
        </div>
      </div>

      <div id="tabKitchen" class="tab-content">
        <div class="kds-wrapper">
          <div class="kds-header"><h2>Kitchen Display</h2><span class="orders-count" id="kdsCount">0 orders</span></div>
          <div class="kds-board" id="kdsBoard"></div>
        </div>
      </div>

      <div id="tabStaff" class="tab-content"><div class="tab-inner" id="staffContent"></div></div>
      <div id="tabSettings" class="tab-content"><div class="tab-inner" id="settingsContent"></div></div>
    </div>
  </div>

  <!-- Payment Modal -->
  <div id="paymentModal" class="modal-overlay" style="display:none">
    <div class="modal-backdrop" id="paymentModalBackdrop"></div>
    <div class="modal-content">
      <div class="modal-header"><h3>Payment</h3><button class="modal-close" id="paymentModalClose"><i data-lucide="x"></i></button></div>
      <div id="paymentModalBody"></div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
